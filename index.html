<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Game Hub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 16px;
      opacity: 0.55;
      margin-bottom: 50px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, 260px);
      gap: 28px;
      justify-content: center;
      max-width: 900px;
      width: 100%;
    }

    .game-card {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 32px 24px 28px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.25s, background 0.25s, box-shadow 0.25s;
      text-decoration: none;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .game-card:hover {
      transform: translateY(-6px);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }

    .game-icon {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      margin-bottom: 18px;
      position: relative;
    }

    .game-icon.gravity-ttt {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .game-icon.dots-boxes {
      background: linear-gradient(135deg, #6a3093, #a044ff);
    }

    .game-icon-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
    }

    .ttt-grid {
      display: grid;
      grid-template-columns: repeat(3, 18px);
      gap: 3px;
    }

    .ttt-cell {
      width: 18px;
      height: 18px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
    }

    .ttt-cell.o { color: #00e5ff; }
    .ttt-cell.x { color: #ff4081; }

    .gravity-arrow {
      font-size: 16px;
      margin-top: 4px;
      opacity: 0.8;
    }

    .dots-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      width: 56px;
      height: 56px;
    }

    .dots-grid .dot {
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      align-self: center;
      justify-self: center;
    }

    .dots-grid .hline {
      height: 3px;
      background: rgba(255, 255, 255, 0.5);
      align-self: center;
      border-radius: 2px;
    }

    .dots-grid .hline.filled { background: #ff6ec7; }

    .dots-grid .vline {
      width: 3px;
      background: rgba(255, 255, 255, 0.5);
      justify-self: center;
      border-radius: 2px;
    }

    .dots-grid .vline.filled { background: #7dd3fc; }

    .dots-grid .box {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: bold;
      color: #ff6ec7;
    }

    .game-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .game-desc {
      font-size: 13px;
      opacity: 0.6;
      line-height: 1.4;
    }

    .game-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .badge-players {
      background: rgba(0, 229, 255, 0.15);
      color: #7dd3fc;
    }
  </style>
</head>

<body>
  <h1>Game Hub</h1>
  <p class="subtitle">Pick a game to play</p>

  <div class="game-grid">
    <a class="game-card" href="news_gravity.html">
      <div class="game-icon gravity-ttt">
        <div class="game-icon-inner">
          <div class="ttt-grid">
            <div class="ttt-cell o">O</div>
            <div class="ttt-cell"></div>
            <div class="ttt-cell x">X</div>
            <div class="ttt-cell"></div>
            <div class="ttt-cell o">O</div>
            <div class="ttt-cell"></div>
            <div class="ttt-cell x">X</div>
            <div class="ttt-cell"></div>
            <div class="ttt-cell o">O</div>
          </div>
          <div class="gravity-arrow">↓</div>
        </div>
      </div>
      <div class="game-title">Gravity Tic Tac Toe</div>
      <div class="game-desc">Tic-tac-toe with shifting gravity. Score points across 4 stages.</div>
      <span class="game-badge badge-players">1–2 Players · Online</span>
    </a>

    <a class="game-card" href="dots_and_boxes.html">
      <div class="game-icon dots-boxes">
        <div class="dots-grid">
          <div class="dot"></div>
          <div class="hline filled"></div>
          <div class="dot"></div>
          <div class="hline"></div>
          <div class="dot"></div>
          <div class="vline filled"></div>
          <div class="box">A</div>
          <div class="vline filled"></div>
          <div class="box"></div>
          <div class="vline"></div>
          <div class="dot"></div>
          <div class="hline filled"></div>
          <div class="dot"></div>
          <div class="hline"></div>
          <div class="dot"></div>
          <div class="vline"></div>
          <div class="box"></div>
          <div class="vline"></div>
          <div class="box"></div>
          <div class="vline"></div>
          <div class="dot"></div>
          <div class="hline"></div>
          <div class="dot"></div>
          <div class="hline"></div>
          <div class="dot"></div>
        </div>
      </div>
      <div class="game-title">Dots and Boxes</div>
      <div class="game-desc">Draw lines, claim boxes, outscore your opponent on a custom grid.</div>
      <span class="game-badge badge-players">2 Players</span>
    </a>
  </div>
</body>

</html>
